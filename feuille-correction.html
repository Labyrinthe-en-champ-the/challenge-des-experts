<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Correction · Équipe En-Champ-Thé</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Georgia,serif;background:#f5f5f0;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1rem;padding:1rem;}
    .card{background:#1A3A2A;color:#fff;border:3px solid #D4AF37;border-radius:16px;padding:2rem 2.5rem;text-align:center;max-width:340px;width:100%;}
    img{width:65px;margin-bottom:1rem;}
    h1{font-size:1.05rem;color:#D4AF37;margin-bottom:.25rem;}
    .sub{font-size:.78rem;color:#8FBA9F;margin-bottom:1.25rem;}
    .qwrap{display:flex;justify-content:center;margin-bottom:1.1rem;}
    .info{font-size:.76rem;color:rgba(255,255,255,.65);line-height:1.6;margin-bottom:.85rem;}
    .info strong{color:#D4AF37;}
    .conf{font-size:.62rem;color:rgba(143,186,159,.45);letter-spacing:.1em;text-transform:uppercase;}
    .btn{display:block;margin:1.25rem auto 0;background:#D4AF37;color:#1A3A2A;border:none;border-radius:6px;padding:.6rem 1.5rem;font-size:.9rem;cursor:pointer;font-family:Georgia,serif;font-weight:bold;}
    @media print{.btn{display:none!important;}body{background:#fff;}}
  </style>
</head>
<body>
  <div class="card">
    <img src="logo-blanc.png" alt="Logo"/>
    <h1>Correction · Challenge des Experts</h1>
    <p class="sub">Labyrinthe En-Champ-Thé · Document équipe</p>
    <div class="qwrap"><div id="qr"></div></div>
    <p class="info">Scannez ce QR code pour accéder à la <strong>correction complète</strong> avec toutes les bonnes réponses.<br/><br/>À remettre au visiteur <strong>uniquement après</strong> qu'il ait terminé le jeu.</p>
    <div class="conf">⚠ Document confidentiel · Ne pas afficher</div>
  </div>
  <button class="btn" onclick="window.print()">🖨️ Imprimer cette feuille</button>
  <script>
    const BASE='https://labyrinthe-en-champ-the.github.io/challenge-des-experts';
    const CT='CORR-ECT-STAFF-2025';
    new QRCode(document.getElementById('qr'),{text:`${BASE}/?correction=${CT}`,width:175,height:175,colorDark:'#D4AF37',colorLight:'#1A3A2A',correctLevel:QRCode.CorrectLevel.H});
  </script>
</body>
</html>
