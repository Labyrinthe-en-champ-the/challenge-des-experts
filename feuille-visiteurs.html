<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>QR Codes Visiteurs · Challenge des Experts</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f5f5f0; padding: 1.5rem; color: #1A3A2A; }
    h1 { text-align: center; font-size: 1.4rem; color: #1A3A2A; margin-bottom: 0.3rem; }
    .subtitle { text-align: center; font-size: 0.85rem; color: #4A8C5C; margin-bottom: 0.5rem; }
    .intro { text-align: center; font-size: 0.82rem; color: #666; margin-bottom: 1.5rem; font-style: italic; }
    .btn-print { display: block; margin: 0 auto 1.5rem; background: #1A3A2A; color: #D4AF37; border: none; border-radius: 6px; padding: 0.6rem 1.5rem; font-size: 0.95rem; cursor: pointer; font-family: Georgia, serif; }
    .qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; max-width: 900px; margin: 0 auto; }
    .qr-card { background: white; border: 1.5px solid #2D5A3D; border-radius: 8px; padding: 0.85rem 0.75rem; text-align: center; page-break-inside: avoid; }
    .qr-card.welcome { background: #1A3A2A; border-color: #D4AF37; border-width: 2px; grid-column: 1 / -1; display: flex; align-items: center; justify-content: center; gap: 1.5rem; padding: 1rem 1.5rem; flex-wrap: wrap; }
    .qr-num { font-size: 0.65rem; font-weight: bold; letter-spacing: 0.08em; text-transform: uppercase; color: #8FBA9F; margin-bottom: 0.25rem; }
    .welcome .qr-num { color: #8FBA9F; }
    .qr-section { font-size: 0.75rem; font-weight: bold; color: #1A3A2A; margin-bottom: 0.6rem; line-height: 1.3; min-height: 2em; }
    .welcome .qr-section { color: #D4AF37; font-size: 0.9rem; min-height: unset; margin-bottom: 0; }
    .qr-wrap { display: flex; justify-content: center; margin-bottom: 0.4rem; }
    .qr-note { font-size: 0.62rem; color: #4A8C5C; font-style: italic; }
    .welcome-text { text-align: left; }
    .welcome-text h2 { color: #D4AF37; font-size: 0.95rem; margin-bottom: 0.25rem; }
    .welcome-text p  { color: rgba(255,255,255,0.7); font-size: 0.75rem; line-height: 1.4; }
    @media print {
      body { padding: 0.5rem; background: white; }
      .btn-print { display: none !important; }
      .qr-grid { grid-template-columns: repeat(5, 1fr); gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <h1>🍃 Challenge des Experts</h1>
  <p class="subtitle">Labyrinthe En-Champ-Thé · Grand-Coude · La Réunion</p>
  <p class="intro">Scannez le QR code de chaque pancarte pour répondre à la question correspondante</p>
  <button class="btn-print" onclick="window.print()">🖨️ Imprimer</button>
  <div class="qr-grid" id="qr-grid"></div>

  <script>
    const BASE_URL     = 'https://labyrinthe-en-champ-the.github.io/challenge-des-experts';
    const ACCESS_TOKEN = 'ECT2025-GRANDCOUDE';
    const ALL_QR = [
      { id: 0,  welcome: true,  section: "Entrée · Commencer le jeu" },
      { id: 1,  token: '7x9mK2pLqR', section: 'Naissance du village' },
      { id: 2,  token: 'Qr4nW8vZbT', section: 'Transition Géranium / Thé' },
      { id: 3,  token: 'Hj2sY6cNwX', section: "Début de l'aventure" },
      { id: 4,  token: 'Pf5tA3mKdL', section: "Développement" },
      { id: 5,  token: 'Zc8rV1nJyQ', section: 'Développement (suite)' },
      { id: 6,  token: 'Wm3hB9sEkU', section: 'Commercialisation' },
      { id: 7,  token: 'Tn6xC4pGfI', section: 'Restructuration' },
      { id: 8,  token: 'Lb7uD2wMrO', section: "Déclin" },
      { id: 9,  token: 'Xk1vF8jHnS', section: "Raisons de l'échec" },
      { id: 10, token: 'Gy4oE5cPtA', section: 'Le Thé dans le monde' },
      { id: 11, token: 'Rf9iN3bQlW', section: 'Le thé au naturel' },
      { id: 12, token: 'Vd2yM7kZeX', section: 'Le thé cultivé' },
      { id: 13, token: 'Jn5pT1sRoC', section: 'Cueillir le thé' },
      { id: 14, token: 'Uh8wK6mFqB', section: 'Sortes de thé' },
      { id: 15, token: 'Ec3bL9nGvY', section: 'Culture relancée' },
      { id: 16, token: 'Aw6jP4hXiD', section: "L'avenir" },
      { id: 17, token: 'Sq1mR7tNkF', section: 'Médailles 2022' }
    ];

    const grid = document.getElementById('qr-grid');
    ALL_QR.forEach(q => {
      const url = q.welcome ? `${BASE_URL}/?access=${ACCESS_TOKEN}` : `${BASE_URL}/?t=${q.token}`;
      const card = document.createElement('div');
      card.className = q.welcome ? 'qr-card welcome' : 'qr-card';
      const qid = `qr-${q.id}`;
      if (q.welcome) {
        card.innerHTML = `<div><div class="qr-wrap"><div id="${qid}"></div></div></div><div class="welcome-text"><div class="qr-num">ACCUEIL</div><h2>🍃 Commencer le jeu</h2><p>Scannez pour accéder à l'écran d'accueil<br/>et découvrir les règles du Challenge !</p></div>`;
      } else {
        card.innerHTML = `<div class="qr-num">Pancarte ${String(q.id).padStart(2,'0')}</div><div class="qr-section">${q.section}</div><div class="qr-wrap"><div id="${qid}"></div></div><div class="qr-note">En-Champ-Thé</div>`;
      }
      grid.appendChild(card);
      new QRCode(document.getElementById(qid), { text: url, width: q.welcome ? 110 : 130, height: q.welcome ? 110 : 130, colorDark: q.welcome ? '#D4AF37' : '#1A3A2A', colorLight: q.welcome ? '#1A3A2A' : '#FFFFFF', correctLevel: QRCode.CorrectLevel.M });
    });
  </script>
</body>
</html>
