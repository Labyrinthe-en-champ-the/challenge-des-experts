<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>QR Codes Visiteurs · Challenge des Experts</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Georgia,serif;background:#f5f5f0;padding:1.25rem;color:#1A3A2A;}
    h1{text-align:center;font-size:1.3rem;color:#1A3A2A;margin-bottom:.25rem;}
    .sub{text-align:center;font-size:.82rem;color:#4A8C5C;margin-bottom:.4rem;}
    .intro{text-align:center;font-size:.78rem;color:#666;margin-bottom:1.25rem;font-style:italic;}
    .btn-print{display:block;margin:0 auto 1.25rem;background:#1A3A2A;color:#D4AF37;border:none;border-radius:6px;padding:.55rem 1.4rem;font-size:.9rem;cursor:pointer;font-family:Georgia,serif;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.9rem;max-width:900px;margin:0 auto;}
    .card{background:#fff;border:1.5px solid #2D5A3D;border-radius:8px;padding:.8rem .7rem;text-align:center;page-break-inside:avoid;}
    .card.welcome{background:#1A3A2A;border:2px solid #D4AF37;grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:1.5rem;flex-wrap:wrap;padding:1rem 1.5rem;}
    .num{font-size:.62rem;font-weight:bold;letter-spacing:.08em;text-transform:uppercase;color:#8FBA9F;margin-bottom:.22rem;}
    .sect{font-size:.72rem;font-weight:bold;color:#1A3A2A;margin-bottom:.6rem;line-height:1.3;min-height:1.9em;}
    .welcome .sect{color:#D4AF37;font-size:.88rem;min-height:unset;margin-bottom:0;}
    .qwrap{display:flex;justify-content:center;margin-bottom:.38rem;}
    .note{font-size:.6rem;color:#4A8C5C;font-style:italic;}
    .winfo{text-align:left;}
    .winfo h2{color:#D4AF37;font-size:.9rem;margin-bottom:.25rem;}
    .winfo p{color:rgba(255,255,255,.7);font-size:.72rem;line-height:1.4;}
    @media print{body{padding:.4rem;background:#fff;}.btn-print{display:none!important;}.grid{grid-template-columns:repeat(5,1fr);gap:.5rem;}}
  </style>
</head>
<body>
  <h1>🍃 Challenge des Experts</h1>
  <p class="sub">Labyrinthe En-Champ-Thé · Grand-Coude · La Réunion</p>
  <p class="intro">Scannez le QR code de chaque pancarte pour répondre à la question</p>
  <button class="btn-print" onclick="window.print()">🖨️ Imprimer</button>
  <div class="grid" id="grid"></div>
  <script>
    const BASE='https://labyrinthe-en-champ-the.github.io/challenge-des-experts';
    const AT='ECT2025-GRANDCOUDE';
    const DATA=[
      {id:0,welcome:true,sect:"Entrée · Commencer le jeu"},
      {id:1,t:'7x9mK2pLqR',sect:'Naissance du village'},
      {id:2,t:'Qr4nW8vZbT',sect:'Transition Géranium / Thé'},
      {id:3,t:'Hj2sY6cNwX',sect:"Début de l'aventure"},
      {id:4,t:'Pf5tA3mKdL',sect:"Développement"},
      {id:5,t:'Zc8rV1nJyQ',sect:'Développement (suite)'},
      {id:6,t:'Wm3hB9sEkU',sect:'Commercialisation'},
      {id:7,t:'Tn6xC4pGfI',sect:'Restructuration'},
      {id:8,t:'Lb7uD2wMrO',sect:"Déclin"},
      {id:9,t:'Xk1vF8jHnS',sect:"Raisons de l'échec"},
      {id:10,t:'Gy4oE5cPtA',sect:'Le Thé dans le monde'},
      {id:11,t:'Rf9iN3bQlW',sect:'Le thé au naturel'},
      {id:12,t:'Vd2yM7kZeX',sect:'Le thé cultivé'},
      {id:13,t:'Jn5pT1sRoC',sect:'Cueillir le thé'},
      {id:14,t:'Uh8wK6mFqB',sect:'Sortes de thé'},
      {id:15,t:'Ec3bL9nGvY',sect:'Culture relancée'},
      {id:16,t:'Aw6jP4hXiD',sect:"L'avenir"},
      {id:17,t:'Sq1mR7tNkF',sect:'Médailles 2022'}
    ];
    const grid=document.getElementById('grid');
    DATA.forEach(q=>{
      const url=q.welcome?`${BASE}/?access=${AT}`:`${BASE}/?t=${q.t}`;
      const card=document.createElement('div');
      card.className=q.welcome?'card welcome':'card';
      const qid=`q${q.id}`;
      if(q.welcome){
        card.innerHTML=`<div><div class="qwrap"><div id="${qid}"></div></div></div><div class="winfo"><div class="num">ACCUEIL</div><h2>🍃 Commencer le jeu</h2><p>Scannez pour découvrir les règles et commencer le Challenge des Experts !</p></div>`;
      } else {
        card.innerHTML=`<div class="num">Pancarte ${String(q.id).padStart(2,'0')}</div><div class="sect">${q.sect}</div><div class="qwrap"><div id="${qid}"></div></div><div class="note">En-Champ-Thé</div>`;
      }
      grid.appendChild(card);
      new QRCode(document.getElementById(qid),{text:url,width:q.welcome?110:130,height:q.welcome?110:130,colorDark:q.welcome?'#D4AF37':'#1A3A2A',colorLight:q.welcome?'#1A3A2A':'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    });
  </script>
</body>
</html>
